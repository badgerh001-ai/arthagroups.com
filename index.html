<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artha Interior Designers — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;600;700&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:        #B8913A;
      --gold-light:  #D4A84B;
      --gold-pale:   #E8C97A;
      --gold-bg:     #F9F3E8;
      --cream:       #FDF8F0;
      --cream-dark:  #F0E8D5;
      --navy:        #0D1628;
      --navy-mid:    #1A2540;
      --text-main:   #1C1C1C;
      --text-soft:   #5A5246;
      --text-muted:  #9B8E7E;
      --border:      rgba(184,145,58,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      font-family: 'Raleway', sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* ── BACKGROUND TEXTURE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(184,145,58,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(184,145,58,0.05) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 10% 70%, rgba(184,145,58,0.04) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── CORNER ORNAMENTS ── */
    .corner {
      position: fixed;
      width: 90px; height: 90px;
      z-index: 1;
      opacity: 0.55;
    }
    .corner.tl { top: 16px; left: 16px; }
    .corner.tr { top: 16px; right: 16px; transform: scaleX(-1); }
    .corner.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
    .corner.br { bottom: 16px; right: 16px; transform: scale(-1,-1); }

    /* ── MAIN WRAPPER ── */
    .wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ── LETTERMARK ── */
    .lettermark-wrap {
      position: relative;
      margin-bottom: 36px;
      animation: revealUp 1s cubic-bezier(0.16,1,0.3,1) both;
    }
    .lettermark-wrap::before {
      content: '';
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(184,145,58,0.13) 0%, transparent 70%);
      animation: breathe 4s ease-in-out infinite;
    }
    .lettermark {
      width: 150px; height: 150px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--navy) 0%, var(--navy-mid) 100%);
      border: 1.5px solid rgba(184,145,58,0.5);
      box-shadow:
        0 0 0 8px rgba(184,145,58,0.08),
        0 20px 60px rgba(13,22,40,0.18),
        0 4px 16px rgba(13,22,40,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 72px;
      font-weight: 700;
      color: var(--gold-pale);
      text-shadow: 0 0 20px rgba(184,145,58,0.5);
      animation: floatUp 6s ease-in-out infinite;
      user-select: none;
      position: relative;
    }
    .lettermark::after {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      border: 1px solid rgba(184,145,58,0.2);
    }

    @keyframes breathe {
      0%,100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.06); opacity: 1; }
    }
    @keyframes floatUp {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes revealUp {
      from { opacity:0; transform:translateY(30px) scale(0.9); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    /* ── TAG LINE ABOVE ── */
    .pre-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.5em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 14px;
      animation: revealUp 1s 0.3s both;
    }

    /* ── ORNAMENT ── */
    .ornament {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      animation: revealUp 1s 0.4s both;
    }
    .ornament .line {
      width: 50px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-light));
    }
    .ornament .line.r {
      background: linear-gradient(90deg, var(--gold-light), transparent);
    }
    .ornament .dot {
      width: 5px; height: 5px;
      background: var(--gold-light);
      transform: rotate(45deg);
      box-shadow: 0 0 8px rgba(184,145,58,0.4);
    }

    /* ── BRAND NAME ── */
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 13vw, 80px);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 4px;
      animation: revealUp 1s 0.5s both;
    }
    .brand-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(13px, 3.5vw, 18px);
      font-weight: 400;
      letter-spacing: 0.35em;
      color: var(--text-soft);
      text-transform: uppercase;
      margin-bottom: 10px;
      animation: revealUp 1s 0.6s both;
    }

    /* ── TAGLINE ── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(16px, 4vw, 21px);
      font-style: italic;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.08em;
      margin-bottom: 40px;
      animation: revealUp 1s 0.7s both;
    }

    /* ── COMING SOON BADGE ── */
    .badge {
      display: inline-block;
      padding: 9px 28px;
      border: 1px solid var(--border);
      background: rgba(184,145,58,0.07);
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.45em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 44px;
      animation: revealUp 1s 0.8s both;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      max-width: 320px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 36px;
      animation: revealUp 1s 0.85s both;
    }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 44px;
      animation: revealUp 1s 0.9s both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 13px 28px;
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 0;
    }

    .btn-wa {
      background: var(--navy);
      color: var(--cream);
      border: 1px solid var(--navy);
    }
    .btn-wa:hover {
      background: var(--navy-mid);
      box-shadow: 0 8px 24px rgba(13,22,40,0.2);
      transform: translateY(-2px);
    }

    .btn-ig {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--border);
    }
    .btn-ig:hover {
      background: rgba(184,145,58,0.08);
      transform: translateY(-2px);
    }

    /* ── INFO ROW ── */
    .info-row {
      display: flex;
      flex-wrap: wrap;
      gap: 18px 32px;
      justify-content: center;
      margin-bottom: 36px;
      animation: revealUp 1s 1s both;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 300;
      transition: color 0.25s;
    }
    .info-item:hover { color: var(--gold); }
    .info-item svg { flex-shrink: 0; }

    /* ── COPYRIGHT ── */
    .copyright {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      font-weight: 300;
      text-transform: uppercase;
      opacity: 0.6;
      animation: revealUp 1s 1.1s both;
    }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      .wrapper { padding: 50px 20px 40px; }
      .lettermark { width: 120px; height: 120px; font-size: 58px; }
      .corner { width: 55px; height: 55px; }
      .corner.tl { top: 10px; left: 10px; }
      .corner.tr { top: 10px; right: 10px; }
      .corner.bl { bottom: 10px; left: 10px; }
      .corner.br { bottom: 10px; right: 10px; }
      .btn-row { flex-direction: column; align-items: center; width: 100%; }
      .btn { width: 100%; max-width: 280px; justify-content: center; }
      .info-row { gap: 14px 20px; }
      .ornament .line { width: 36px; }
    }
  </style>
</head>
